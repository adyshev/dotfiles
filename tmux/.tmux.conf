unbind-key -a
if-shell '[ -r "$HOME/.tmux.reset.conf" ]' 'source-file "$HOME/.tmux.reset.conf"'

unbind C-b
unbind '"'
unbind %
unbind r
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

set -g prefix C-a
set -sg escape-time 0
set -g status-position top

# Terminal & colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,*:RGB"

# Allow terminal escape passthrough (needed for kitty graphics protocol in tmux)
set -g allow-passthrough all

# Cursor shape passthrough, undercurl, and underline colors.
set -as terminal-overrides ',linux*:AX@,*:Ss=\E[%p1%d q:Se=\E[2 q,*:Smulx=\E[4::%p1%dm,*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -s set-clipboard on
set -g base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#W | P:#{pane_index}/#{window_panes} W:#{window_index}/#{session_windows}"
set -g mouse on
set -g history-limit 50000
set -g extended-keys on
set -g extended-keys-format csi-u

set-option -g focus-events on
set-option -g automatic-rename on
if-shell 'test -x /bin/zsh' 'set-option -g default-shell /bin/zsh'
if-shell 'test -x /usr/bin/zsh' 'set-option -g default-shell /usr/bin/zsh'
if-shell 'test -x /usr/local/bin/zsh' 'set-option -g default-shell /usr/local/bin/zsh'
if-shell 'test -x /opt/homebrew/bin/zsh' 'set-option -g default-shell /opt/homebrew/bin/zsh'

if-shell '[ "$(uname -s)" = "Darwin" ] && command -v pbcopy >/dev/null 2>&1 && command -v pbpaste >/dev/null 2>&1' {
    set -s copy-command 'pbcopy'
    set -g @copy_command 'pbcopy'
} {
    if-shell '[ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1 && command -v wl-paste >/dev/null 2>&1' {
        set -s copy-command 'wl-copy --foreground --type text/plain'
        set -g @copy_command 'wl-copy --foreground --type text/plain'
    } {
        if-shell '[ -n "$DISPLAY" ] && command -v xclip >/dev/null 2>&1' {
            set -s copy-command 'xclip -quiet -i -selection clipboard'
            set -g @copy_command 'xclip -quiet -i -selection clipboard'
        } {
            if-shell '[ -n "$DISPLAY" ] && command -v xsel >/dev/null 2>&1' {
                set -s copy-command 'xsel --clipboard --input'
                set -g @copy_command 'xsel --clipboard --input'
            }
        }
    }
}

set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi

bind C-a send-prefix

bind c new-window -c "#{pane_current_path}"
bind v copy-mode
bind d detach

bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z
bind -r J swap-pane -D
bind -r K swap-pane -U
bind -r a last-window

bind r source-file ~/.tmux.conf

bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 10

bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @yank_selection 'clipboard'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'

if-shell '[ -x "$HOME/.tmux/plugins/tpm/tpm" ]' 'run "$HOME/.tmux/plugins/tpm/tpm"'

# Seamless C-h/j/k/l navigation between tmux panes and Vim/Neovim windows.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(.*/)?(g?\.?(view|l?n?vim?x?)(diff)?|fzf)$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Status bar (after tpm to override plugin defaults)
set -g status on
set -g status-style "bg=default,fg=#665c54"
set -g status-left ""
set -g status-right-length 60
set -g status-right " P:#{pane_index}/#{window_panes} W:#{window_index}/#{session_windows}  #[fg=#a9b665]%a %e %b, %H:%M "
set -g status-right-style "fg=#a79a84"
set -g status-justify left
set -g window-status-separator ""
set -g window-status-format " #I:#{?window_name,#W,·} "
set -g window-status-current-format " #I:#{?window_name,#W,·} "
set -g window-status-current-style "fg=#e78a4e"
set -g window-status-style "fg=#665c54"
set -g pane-border-status off
set -g pane-border-lines single
set -g pane-border-style "fg=#5b524c"
set -g pane-active-border-style "fg=#a79a84"
