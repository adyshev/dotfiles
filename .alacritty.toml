# themes from https://github.com/alacritty/alacritty-theme

# import = ["/Users/mischa/.config/alacritty/themes/themes/gruvbox_dark.toml"]
import = [
    # "~/.config/alacritty/themes/themes/one_dark.toml"
    # "~/.config/alacritty/themes/themes/remedy_dark.toml"
    # "~/.config/alacritty/themes/themes/gruvbox_material_medium_dark.toml"
    "~/.config/alacritty/themes/themes/dark_pastels.toml"
]

ipc_socket = true

[selection]
save_to_clipboard = true

[font]
size = 16

[env]
TERM = "xterm-256color"

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[window]
decorations = "None"
startup_mode = "Fullscreen"
option_as_alt = "Both"
dynamic_padding = false

[window.padding]
x = 0
y = 0

[shell]
program = "/bin/zsh"
args = ["-l", "-c", "/opt/homebrew/bin/tmux new-session -A -D -s default"]
